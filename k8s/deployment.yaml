apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulsar-api
  namespace: pulsar
  labels:
    app: pulsar-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pulsar-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: pulsar-api
    spec:
      containers:
        - name: pulsar-api
          image: ghcr.io/deveunicee/pulsar-contracts:latest
          ports:
            - containerPort: 8080
          env:
            - name: NETWORK
              valueFrom:
                configMapKeyRef:
                  name: pulsar-config
                  key: network
            - name: CONTRACT_ID
              valueFrom:
                secretKeyRef:
                  name: pulsar-secrets
                  key: contract-id
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config-volume
              mountPath: /app/config
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: pulsar-config

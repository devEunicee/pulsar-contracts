apiVersion: v1
kind: ConfigMap
metadata:
  name: pulsar-config
  namespace: pulsar
data:
  network: "testnet"
  log_level: "info"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pulsar-data
  namespace: pulsar
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 5Gi

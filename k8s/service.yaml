apiVersion: v1
kind: Service
metadata:
  name: pulsar-api
  namespace: pulsar
  labels:
    app: pulsar-api
spec:
  selector:
    app: pulsar-api
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pulsar-api
  namespace: pulsar
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: api.pulsar.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pulsar-api
                port:
                  number: 80

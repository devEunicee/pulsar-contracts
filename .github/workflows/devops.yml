name: DevOps validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker build
        run: docker build -t pulsar-contracts:test .
      - name: Check Terraform syntax
        run: |
          docker run --rm -v "$PWD/infra/terraform:/workspace" -w /workspace hashicorp/terraform:1.6.6 fmt -check -recursive
      - name: Validate deployment script
        run: bash infra/blue-green/deployment.sh green

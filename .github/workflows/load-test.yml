name: Load Tests

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Scenario to run (default: all except endurance)'
        required: false
        default: 'ramp_up,sustained,spike'

jobs:
  load-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install k6 -y

      - name: Run load tests
        env:
          BASE_URL: ${{ secrets.LOAD_TEST_BASE_URL || 'http://localhost:8080' }}
        run: k6 run --out json=load-test-results.json load-tests/k6/load-test.js

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-results
          path: load-test-results.json

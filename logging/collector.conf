[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

[INPUT]
    Name        tail
    Path        /var/log/app/*.log
    Tag         app
    Parser      json
    Mem_Buf_Limit 5MB
    Skip_Long_Lines On

[FILTER]
    Name    modify
    Match   *
    Remove  authorization
    Remove  token
    Remove  password
    Remove  secret
    Remove  api_key

[OUTPUT]
    Name  stdout
    Match *

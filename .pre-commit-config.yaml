repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt --check
        description: Ensure all Rust code is formatted with rustfmt before committing.
        language: system
        entry: cargo fmt --all -- --check
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        description: Run Clippy linter and fail on any warnings.
        language: system
        entry: cargo clippy --all-targets --all-features -- -D warnings
        types: [rust]
        pass_filenames: false
